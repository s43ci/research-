<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واثِق - استبيان طلاب الأشعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #1565c0; /* أزرق طبي داكن */
            --secondary: #1e88e5; /* أزرق فاتح */
            --bg: #f0f4f8;
            --white: #ffffff;
            --text: #263238;
            --error: #d32f2f;
            --success: #2e7d32;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-wrapper {
            flex: 1;
            padding: 20px;
            padding-bottom: 60px;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(21, 101, 192, 0.1);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        /* شاشة البداية */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            text-align: center;
        }

        .logo-text {
            font-size: 3em;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .input-group-start {
            margin: 30px 0;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #bbdefb;
            width: 100%;
            max-width: 350px;
        }

        .input-group-start label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--primary);
        }

        .input-group-start input {
            width: 80%;
            padding: 12px;
            font-size: 1.3em;
            text-align: center;
            border: 2px solid #bbdefb;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
            outline: none;
        }

        .input-group-start input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.2);
        }

        .btn-start {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            padding: 15px 60px;
            font-size: 1.2em;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(21, 101, 192, 0.4); }

        /* واجهة الاستبيان */
        #survey-view { display: none; }

        .progress-header {
            background: #e3f2fd;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border: 1px solid #bbdefb;
        }

        .counter-badge {
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .section-title {
            background: linear-gradient(90deg, var(--primary), transparent);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            margin-top: 30px;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 1.2em;
        }

        .question-block {
            margin-bottom: 15px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background: #fff;
            transition: all 0.2s;
        }

        .question-block:hover { border-color: var(--secondary); background: #fafbfc; }

        .question-block.unanswered {
            border: 2px solid var(--error);
            background-color: #ffebee;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .q-text {
            font-weight: 700;
            margin-bottom: 15px;
            display: block;
            color: var(--text);
            font-size: 1.05em;
        }

        .options-grid { display: flex; gap: 15px; flex-wrap: wrap; }
        .options-grid.horizontal-mode { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }

        .options-grid label {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            user-select: none;
            flex: 1 1 auto;
        }

        .options-grid label:hover { background: #e3f2fd; border-color: var(--secondary); }
        .options-grid input[type="radio"] { accent-color: var(--primary); transform: scale(1.2); }
        .options-grid label:has(input:checked) {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            font-weight: 600;
        }

        /* حقل الإدخال النصي (للعمر) */
        .number-input {
            width: 100%;
            max-width: 200px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1em;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .number-input:focus { border-color: var(--secondary); }

        .action-bar {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            flex: 1;
            transition: 0.2s;
        }

        .btn-next { background-color: var(--primary); color: white; }
        .btn-prev { background-color: #78909c; color: white; }
        .btn-clear { background-color: #ff5252; color: white; flex: 0 0 120px; }

        #export-section { display: none; text-align: center; padding: 50px 20px; }
        .success-icon { font-size: 60px; color: var(--success); margin-bottom: 20px; display: block; }
        .btn-excel { background-color: #1b5e20; color: white; width: 100%; margin-bottom: 15px; }
        .btn-word { background-color: #0d47a1; color: white; width: 100%; }

        .footer {
            text-align: center;
            padding: 15px;
            background-color: var(--white);
            border-top: 1px solid #eee;
            color: var(--primary);
            font-weight: 600;
            margin-top: auto;
            width: 100%;
            box-sizing: border-box;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(38, 50, 56, 0.9);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <div id="welcome-screen">
            <div class="logo-text">واثِق</div>
            <h2 style="color:var(--text); margin-top:0;">تقييم معارف طلاب قسم الأشعة حول جهاز السونار اللاسلكي</h2>
            
            <div class="input-group-start">
                <label for="start-count">عدد العينات المستهدف:</label>
                <input type="number" id="start-count" value="30" min="1">
            </div>

            <button class="btn-start" onclick="startSurvey()">ابدأ المشروع</button>
            <p style="color:#78909c; font-size:0.9em; margin-top:20px;">يتم الحفظ تلقائياً</p>
        </div>

        <div id="survey-view">
            <div class="progress-header">
                <div>
                    <span style="color:#78909c">العينة الحالية:</span>
                    <span id="current-display" class="counter-badge">1</span>
                </div>
                <div>
                    <span style="color:#78909c">من أصل:</span>
                    <span id="total-display" style="font-weight:bold; font-size:1.1em; margin-right:5px;">30</span>
                </div>
                <button onclick="hardReset()" style="margin-right:auto; background:none; border:none; color:#b0bec5; cursor:pointer; font-family:'Cairo'"> إعادة ضبط ↻</button>
            </div>

            <form id="mainForm">
                <div id="questions-area"></div>
            </form>

            <div class="action-bar">
                <button class="btn btn-prev" onclick="prevSample()" id="btn-prev" disabled>السابق</button>
                <button class="btn btn-clear" onclick="clearCurrentSample()">مسح العينة</button>
                <button class="btn btn-next" onclick="nextSample()" id="btn-next">التالي وحفظ</button>
            </div>
        </div>

        <div id="export-section">
            <span class="success-icon">✔</span>
            <h2 style="color:var(--text)">تم إكمال الاستبيان بنجاح!</h2>
            <p style="color:#607d8b; margin-bottom:30px;">بياناتك جاهزة للتصدير</p>
            
            <button class="btn btn-excel" onclick="exportExcel()">تحميل ملف Excel (.xlsx)</button>
            <button class="btn btn-word" onclick="exportWord()">تحميل ملف Word (.docx)</button>
            
            <div style="margin-top:30px;">
                <button class="btn btn-prev" onclick="returnToSurvey()" style="width:auto; padding:10px 30px;">عودة للمراجعة</button>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    تم التطوير بواسطة واثق محمد
</div>

<div id="toast" class="toast">تم الحفظ بنجاح</div>

<script>
    // --- هيكلية الاستبيان بناءً على الملف المرفق ---
    const structure = [
        {
            title: "المعلومات الديموغرافية للطالب:",
            type: "demo",
            qs: [
                {t:"1- العمر (سنة):", type:"number"}, // تم تغييره لإدخال رقمي
                {t:"2- الجنس:", type:"radio", o:[{t:"ذكر",v:0}, {t:"أنثى",v:1}]},
                {t:"3- هل انت موظف:", type:"radio", o:[{t:"كلا",v:0}, {t:"نعم",v:1}]},
                {t:"4- الحالة الزوجية:", type:"radio", o:[{t:"متزوج",v:0}, {t:"أعزب",v:1}, {t:"أرمل",v:2}, {t:"مطلق",v:3}, {t:"منفصل",v:4}]},
                {t:"5- المرحلة الدراسية:", type:"radio", o:[{t:"المرحلة الثالثة",v:0}, {t:"المرحلة الرابعة",v:1}]},
                {t:"6- بيئة السكن:", type:"radio", o:[{t:"حضر",v:0}, {t:"ريف",v:1}]},
                {t:"7- الدخل الشهري للأسرة (بالدينار العراقي):", type:"radio", o:[
                    {t:"أقل من 300.000",v:0}, {t:"300.000 - 600.000",v:1}, 
                    {t:"601.000 - 900.000",v:2}, {t:"901.000 - 1.200.000",v:3}, 
                    {t:"1.201.000 - 1.500.000",v:4}, {t:"1.501.000 أو أكثر",v:5}
                ]}
            ]
        },
        {
            title: "تقييم معارف الطلاب:",
            type: "knowledge",
            qs: [
                {t:"1- يساعد تكرار الفحص بالسونار في متابعة تطور حالة النزيف الطحالي", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"2- يُغني السونار عن التصوير بالمفراس الحلزوني في المرضى المصابين بإصابات صدرية معقدة", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"3- يكشف السونار جميع درجات التمزق الكبدي وطحال مقارنة بالتصوير بالمفراس الحلزوني", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"4- للسونار دور في تقييم إصابات الرأس في الطوارئ", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"5- السونار مفيد كفحص أولي في تقييم إصابات الكلى في قسم الطوارئ", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"6- تكون وضعية الجهاز محددة اثناء فحص المريض", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"7- يساعد السونار في اتخاذ قرار التدخل الجراحي العاجل للحالات الحرجة", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"8- يمكن استخدام فحص FAST لتقييم إصابات الكبد بسرعة في الطوارئ", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"9- يُسهم التشخيص المبكر باستخدام السونار في تقليل نسبة الوفيات في مرضى حوادث العامة بشكل قليل", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"10- استخدام جهاز سونار محمول لاسلكي قد يقلل زمن الاستجابة في أقسام الطوارئ", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"11- الفحص الديناميكي المتكرر يزيد من احتمالية اكتشاف النزيف المتأخر", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"12- يُظهر السونار كفاءة مشابهة للأشعة السينية (Chest X-ray) في كشف الاسترواح الصدري المبكر", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"13- يمكن إجراء فحص بالسونار خلال دقائق دون الحاجة إلى نقل المريض من سرير الطوارئ", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"14- للسونار دور في تشخيص كسور العظام الطويلة اثناء الاصابة بحوادث عامة", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"15- سهولة نقل جهاز السونار المحمول تسهم في تسريع التقييم الأولي بشكل بسيط", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"16- يُعد السونار المحمول وسيلة آمنة من حيث عدم التعرض للإشعاع مقارنةً بـ CT", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"17- أي شخص يعمل في قسم الاشعة يستطيع العمل على جهاز السونار اللاسلكي المحمول", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"18- الكبد من أكثر الأعضاء تعرضًا للإصابة في حوادث المرور والرضوض البطنية فيحتاج جهاز السونار اللاسلكي المحمول ضروري", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"19- تكون بعض إصابات الكبد غير واضحة في المراحل المبكرة عند الفحص بجهاز السونار اللاسلكي المحمول", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]},
                {t:"20- الطحال من أكثر الأعضاء عرضة للتمزق في الرضوض البطنية في حوادث العامة", type:"radio", o:[{t:"أعرف",v:0}, {t:"غير متأكد",v:1}, {t:"لا أعرف",v:2}]}
            ]
        }
    ];

    let appState = {
        target: 30,
        currentIdx: 0,
        data: []
    };

    window.onload = function() {
        const saved = localStorage.getItem('wathiq_radiology_v1');
        if (saved) {
            appState = JSON.parse(saved);
            document.getElementById('start-count').value = appState.target;
            showSurveyInterface();
        }
    };

    function startSurvey() {
        const countInput = document.getElementById('start-count').value;
        const count = parseInt(countInput);
        if (count && count > 0) {
            appState.target = count;
            if (appState.data.length < count) {
                for(let i=appState.data.length; i<count; i++) appState.data.push({});
            }
            saveState();
            showSurveyInterface();
        } else {
            alert("يرجى إدخال عدد صحيح.");
        }
    }

    function showSurveyInterface() {
        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('survey-view').style.display = 'block';
        updateUI();
        renderForm();
        window.scrollTo(0,0);
    }

    function renderForm() {
        const container = document.getElementById('questions-area');
        container.innerHTML = '';
        let globalQIndex = 1;

        structure.forEach((section) => {
            const secDiv = document.createElement('div');
            secDiv.innerHTML = `<div class="section-title">${section.title}</div>`;
            const gridClass = section.type === 'knowledge' ? 'options-grid horizontal-mode' : 'options-grid';

            section.qs.forEach((q) => {
                const qKey = `q${globalQIndex}`;
                const qBlock = document.createElement('div');
                qBlock.className = 'question-block';
                qBlock.id = `block_${qKey}`;

                let optionsHTML = '';
                const savedVal = appState.data[appState.currentIdx] ? appState.data[appState.currentIdx][qKey] : '';

                if (q.type === 'number') {
                    // حقل إدخال الأرقام (العمر)
                    optionsHTML = `<input type="number" class="number-input" name="${qKey}" value="${savedVal !== undefined ? savedVal : ''}" oninput="autoSaveField('${qKey}', this.value)" placeholder="أدخل العمر">`;
                } else {
                    // خيارات الراديو
                    q.o.forEach((opt) => {
                        const isChecked = (savedVal !== '' && savedVal == opt.v) ? 'checked' : '';
                        optionsHTML += `
                            <label>
                                <input type="radio" name="${qKey}" value="${opt.v}" ${isChecked} onchange="autoSaveField('${qKey}', ${opt.v})">
                                ${opt.t}
                            </label>
                        `;
                    });
                }

                qBlock.innerHTML = `
                    <span class="q-text">${q.t}</span>
                    <div class="${gridClass}">${optionsHTML}</div>
                `;
                secDiv.appendChild(qBlock);
                globalQIndex++;
            });
            container.appendChild(secDiv);
        });
    }

    function autoSaveField(key, value) {
        if (!appState.data[appState.currentIdx]) appState.data[appState.currentIdx] = {};
        appState.data[appState.currentIdx][key] = value;
        saveState();
        document.getElementById(`block_${key}`).classList.remove('unanswered');
    }

    function nextSample() {
        if (validateCurrentSample()) {
            if (appState.currentIdx < appState.target - 1) {
                appState.currentIdx++;
                saveState();
                renderForm();
                updateUI();
                showToast();
                window.scrollTo(0, 0);
            } else {
                saveState();
                showExport();
            }
        }
    }

    function prevSample() {
        if (appState.currentIdx > 0) {
            appState.currentIdx--;
            saveState();
            renderForm();
            updateUI();
            window.scrollTo(0, 0);
        }
    }

    function validateCurrentSample() {
        const currentData = appState.data[appState.currentIdx] || {};
        let totalQuestions = 27; // 7 ديموغرافية + 20 معارف
        let firstMissing = null;

        document.querySelectorAll('.question-block').forEach(b => b.classList.remove('unanswered'));

        for (let i = 1; i <= totalQuestions; i++) {
            const key = `q${i}`;
            const val = currentData[key];
            if (val === undefined || val === '') {
                const block = document.getElementById(`block_${key}`);
                block.classList.add('unanswered');
                if (!firstMissing) firstMissing = block;
            }
        }

        if (firstMissing) {
            firstMissing.scrollIntoView({ behavior: 'smooth', block: 'center' });
            return false;
        }
        return true;
    }

    function updateUI() {
        document.getElementById('current-display').innerText = appState.currentIdx + 1;
        document.getElementById('total-display').innerText = appState.target;
        document.getElementById('btn-prev').disabled = (appState.currentIdx === 0);
        
        const nextBtn = document.getElementById('btn-next');
        if (appState.currentIdx === appState.target - 1) {
            nextBtn.innerText = "إنهاء وتصدير";
            nextBtn.style.backgroundColor = "#2e7d32";
        } else {
            nextBtn.innerText = "التالي وحفظ";
            nextBtn.style.backgroundColor = ""; 
        }
    }

    function clearCurrentSample() {
        if(confirm("هل أنت متأكد من مسح إجابات هذه العينة؟")) {
            appState.data[appState.currentIdx] = {};
            renderForm();
            saveState();
        }
    }

    function saveState() {
        localStorage.setItem('wathiq_radiology_v1', JSON.stringify(appState));
    }

    function hardReset() {
        if(confirm("تحذير: سيتم حذف جميع البيانات! هل أنت متأكد؟")) {
            localStorage.removeItem('wathiq_radiology_v1');
            location.reload();
        }
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 1000);
    }

    // --- التصدير ---

    function showExport() {
        document.getElementById('survey-view').style.display = 'none';
        document.getElementById('export-section').style.display = 'block';
    }

    function returnToSurvey() {
        document.getElementById('survey-view').style.display = 'block';
        document.getElementById('export-section').style.display = 'none';
    }

    function prepareData() {
        return appState.data.slice(0, appState.target).map((item, idx) => {
            let row = { 'ID': idx + 1 };
            for(let i=1; i<=27; i++) {
                row[`Q${i}`] = (item[`q${i}`] !== undefined) ? item[`q${i}`] : ''; 
            }
            return row;
        });
    }

    function exportExcel() {
        const ws = XLSX.utils.json_to_sheet(prepareData());
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Radiology_Data");
        XLSX.writeFile(wb, "Radiology_Survey.xlsx");
    }

    function exportWord() {
        const data = prepareData();
        let html = `<h2 style='text-align:center; font-family:Arial'>بيانات استبيان طلاب الأشعة</h2>`;
        html += `<table border="1" style="border-collapse: collapse; text-align: center; width:100%; direction:rtl; font-family:Arial;">`;
        
        html += `<tr style="background:#eee;"><th>ت</th>`;
        for(let i=1; i<=27; i++) html += `<th>س${i}</th>`;
        html += `</tr>`;
        
        data.forEach(row => {
            html += `<tr><td>${row['ID']}</td>`;
            for(let i=1; i<=27; i++) html += `<td>${row[`Q${i}`] !== '' ? row[`Q${i}`] : '-'}</td>`;
            html += `</tr>`;
        });
        html += `</table>`;
        html += `<br><p style='text-align:center'>تم التطوير بواسطة واثق محمد</p>`;
        
        const blob = new Blob(['\ufeff', `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'></head><body>${html}</body></html>`], {type: 'application/msword'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'Radiology_Survey.doc';
        link.click();
    }
</script>

</body>
